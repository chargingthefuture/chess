<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#111827" />
    <meta
      name="description"
      content="♟️ Play offline chess against a Stockfish bot at Easy, Medium or Hard. Turn on Coach for the best move and your mistakes, or Explain for AI commentary. Installs to your phone and plays offline."
    />

    <!-- Social link preview. Quora / Slack / iMessage / etc. read these Open Graph + Twitter
         Card tags for the preview card; a plain <meta name="description"> alone is ignored by
         most of them (that's why the shared link showed a title but no description). URLs must
         be absolute, so they hard-code the deployed Pages address. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chess Coach" />
    <meta property="og:title" content="Chess Coach" />
    <meta
      property="og:description"
      content="♟️ Play offline chess against a Stockfish bot at Easy, Medium or Hard. Turn on Coach for the best move and your mistakes, or Explain for AI commentary. Installs to your phone and plays offline."
    />
    <meta property="og:url" content="https://chargingthefuture.github.io/chess/" />
    <meta property="og:image" content="https://chargingthefuture.github.io/chess/pwa-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Chess Coach" />
    <meta
      name="twitter:description"
      content="♟️ Play offline chess against a Stockfish bot at Easy, Medium or Hard. Turn on Coach for the best move and your mistakes, or Explain for AI commentary. Installs to your phone and plays offline."
    />
    <meta name="twitter:image" content="https://chargingthefuture.github.io/chess/pwa-512x512.png" />
    <!-- iOS standalone / home-screen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chess" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Chess Coach</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
